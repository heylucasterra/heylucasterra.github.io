<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting to getamigo.app</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <meta http-equiv="refresh" content="0; url=https://getamigo.app/" />
    <link rel="canonical" href="https://getamigo.app/" />
    <script>
      // Belt-and-braces fallback for browsers that ignore meta refresh.
      window.location.replace("https://getamigo.app/");
    </script>
  </head>
  <body>
    <p>
      Amigo has moved to
      <a href="https://getamigo.app/">getamigo.app</a>.
    </p>
  </body>
</html>
